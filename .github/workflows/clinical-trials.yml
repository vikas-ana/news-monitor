name: Clinical Trials Monitor

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 7am UTC
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Send alerts even for unchanged trials (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write

jobs:
  monitor-trials:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Step 1 — Fetch & diff ClinicalTrials.gov
        run: python src/trials_monitor.py
        # Queries all 4 indications, filters by tracked companies,
        # compares vs stored state, marks new/changed as is_alert=true

      - name: Step 2 — Send trial alerts via email
        run: python src/email_alerts.py --source trials
        continue-on-error: true
        # Sends alerts for clinical_trials where is_alert=true and alert_sent=false
