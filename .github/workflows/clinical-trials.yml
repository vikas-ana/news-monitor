name: Clinical Trials Monitor

on:
  schedule:
    # Every 15 min during CT.gov update window: 08:00–11:00 UTC daily
    # CT.gov dataTimestamp confirms daily update at ~09:00 UTC
    - cron: '0,15,30,45 8-11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-trials:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Step 1 — Fetch & diff ClinicalTrials.gov
        run: python src/trials_monitor.py

      # Trial email alerts disabled — re-enable when trial data quality is verified
      # - name: Step 2 — Send trial alerts via email
      #   run: python src/email_alerts.py --source trials
