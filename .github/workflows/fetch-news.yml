name: News Monitor Fetcher

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to backfill (default: 2)'
        required: false
        default: '2'

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run fetcher
        run: |
          DAYS=${{ github.event.inputs.days_back || '2' }}
          python src/fetcher.py --days $DAYS

      - name: Commit backup JSON
        run: |
          git config user.name "News Monitor Bot"
          git config user.email "bot@news-monitor"
          git add output/results.json
          git diff --staged --quiet || git commit -m "news: update results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
