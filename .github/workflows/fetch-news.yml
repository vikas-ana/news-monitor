name: News Monitor Fetcher

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to backfill (default: 2)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_KEY: ${{ secrets.GROQ_KEY }}
      NEO4J_URI: neo4j+s://e56a592d.databases.neo4j.io
      NEO4J_USER: ${{ secrets.NEO4J_USER }}
      NEO4J_PASS: ${{ secrets.NEO4J_PASS }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install neo4j

      - name: Step 1 — Fetch news
        run: |
          DAYS=${{ github.event.inputs.days_back || '2' }}
          python src/fetcher.py --days $DAYS

      - name: Step 2 — LLM Process (classify, summarize, score, alert)
        run: python src/processor.py

      - name: Step 3 — Sync to Neo4j knowledge graph
        run: python src/load_neo4j.py
        continue-on-error: true
        # MERGE = idempotent: updates existing nodes, creates new ones
        # New drugs (is_new_asset=true) are added automatically each cycle

      - name: Step 4 — Send email alerts (score ≥ 6, unsent)
        run: python src/email_alerts.py
        continue-on-error: true

      - name: Commit backup JSON
        continue-on-error: true
        run: |
          git config user.name "News Monitor Bot"
          git config user.email "bot@news-monitor"
          git add output/results.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "news: update results [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
