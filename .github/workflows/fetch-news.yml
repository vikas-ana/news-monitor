name: News Monitor Fetcher

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:          # Allow manual trigger anytime

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run fetcher
        run: python src/fetcher.py

      - name: Commit results
        run: |
          git config user.name "News Monitor Bot"
          git config user.email "bot@news-monitor"
          git add output/results.json
          git diff --staged --quiet || git commit -m "news: update results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
