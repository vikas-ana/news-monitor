name: News Monitor Fetcher

on:
  schedule:
    - cron: '0 7,14,21 * * *'   # 3x daily: 7am, 2pm, 9pm UTC
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to backfill (default: 2)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_KEY: ${{ secrets.GROQ_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      NEO4J_URI: neo4j+s://e56a592d.databases.neo4j.io
      NEO4J_USER: ${{ secrets.NEO4J_USER }}
      NEO4J_PASS: ${{ secrets.NEO4J_PASS }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install neo4j

      - name: Step 1a — Fetch news (RSS feeds)
        run: |
          DAYS=${{ github.event.inputs.days_back || '2' }}
          python src/fetcher.py --days $DAYS

      - name: Step 1b — Fetch company press releases (Jina.ai direct scraping)
        run: python src/press_release_scraper.py --days 7
        continue-on-error: true

      - name: Step 2 — Fetch full article content (scrape + Groq expand)
        run: python src/backfill_content.py
        continue-on-error: true

      - name: Step 3 — LLM Process (classify, summarize, score, alert)
        run: python src/processor.py

      - name: Step 3b — Embed articles (Jina AI vector embeddings)
        run: python src/embed_articles.py
        continue-on-error: true

      - name: Step 3c — Update wiki pages (Karpathy living knowledge base) [PAUSED]
        if: false
        run: python src/wiki_updater.py
        continue-on-error: true

      - name: Step 4 — Sync to Neo4j knowledge graph
        run: python src/load_neo4j.py
        continue-on-error: true

      - name: Step 5 — Send email alerts (score >= 7, RAG-enriched)
        run: python src/email_alerts.py
        continue-on-error: true

      - name: Commit backup JSON
        continue-on-error: true
        run: |
          git config user.name "News Monitor Bot"
          git config user.email "bot@news-monitor"
          git add output/results.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "news: update results [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
