name: Send Comparison Alerts (One-off)

on:
  workflow_dispatch:

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_KEY: ${{ secrets.GROQ_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      NEO4J_URI: neo4j+s://e56a592d.databases.neo4j.io
      NEO4J_USER: ${{ secrets.NEO4J_USER }}
      NEO4J_PASS: ${{ secrets.NEO4J_PASS }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install neo4j

      - name: Fetch top articles from Supabase
        run: |
          curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/articles?select=id,catchy_title,raw_title,product_name,company,indication,category,relevance_score,summary,alert_text,full_content,article_date,url&processed_at=not.is.null&relevance_score=gte.4&order=relevance_score.desc,article_date.desc&limit=20" \
            > /tmp/articles_for_alert.json
          echo "Articles fetched: $(python3 -c "import json; print(len(json.load(open('/tmp/articles_for_alert.json'))))")"

      - name: Generate and send comparison alerts
        run: python3 src/send_comparison_alerts.py
