name: Send Email Alerts

on:
  # Run after each news processing cycle (offset by 30 min from fetch)
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch: {}

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://ijunshkmqdqhdeivcjze.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send alert emails
        run: python src/email_alerts.py
